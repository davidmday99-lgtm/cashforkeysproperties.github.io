<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Application | Cash For Keys Properties</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --card: #121212;
            --text: #fff;
            --text-soft: #a3a3a3;
            --border: #262626;
            --orange: #ff6700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .navbar {
            background: var(--orange);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .nav-logo img {
            height: 200px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .nav-logo img {
                height: 150px;
            }

            .navbar {
                padding: 8px 0;
            }

            .nav-links {
                gap: 10px;
                font-size: 12px;
            }

            .nav-links a {
                font-size: 12px;
            }
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: var(--orange);
        }

        .form-header p {
            font-size: 16px;
            color: var(--text-soft);
        }

        .form-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            font-size: 18px;
            color: var(--orange);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 14px;
        }

        .required {
            color: var(--orange);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea {
            padding: 12px;
            border: 1px solid var(--border);
            background: #000;
            color: var(--text);
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255, 103, 0, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .button-row {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--orange);
            color: #000;
        }

        .btn-primary:hover {
            background: #e55a00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 103, 0, 0.3);
        }

        footer {
            background: #000;
            padding: 30px 20px;
            text-align: center;
            color: var(--text-soft);
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .form-header h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            .form-header p {
                font-size: 13px;
            }

            .form-container {
                padding: 16px;
            }

            .form-section h2 {
                font-size: 14px;
                margin-bottom: 12px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            label {
                font-size: 12px;
                margin-bottom: 6px;
            }

            input,
            select,
            textarea {
                padding: 10px;
                font-size: 14px;
            }

            .button-row {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><img src="logo-main.png" alt="Cash For Keys"></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/#process">How It Works</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-header">
            <h1>Rental Application</h1>
            <p>Apply to rent one of our properties</p>
        </div>

        <div class="form-container">
            <form action="https://formspree.io/f/xjgzrdev" method="POST">

                <!-- Applicant Information -->
                <div class="form-section">
                    <h2>Applicant Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullname">Full Name <span class="required">*</span></label>
                            <input type="text" id="fullname" name="fullname" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address <span class="required">*</span></label>
                            <input type="email" id="email" name="email" required placeholder="john@example.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number <span class="required">*</span></label>
                            <input type="tel" id="phone" name="phone" required placeholder="(555) 123-4567">
                        </div>
                        <div class="form-group">
                            <label for="ssn">Social Security Number <span class="required">*</span></label>
                            <input type="text" id="ssn" name="ssn" placeholder="XXX-XX-XXXX" maxlength="11" required>
                        </div>
                    </div>
                </div>

                <!-- Employment Information -->
                <div class="form-section">
                    <h2>Employment Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="jobtitle">Job Title <span class="required">*</span></label>
                            <input type="text" id="jobtitle" name="jobtitle" required placeholder="Software Engineer">
                        </div>
                        <div class="form-group">
                            <label for="employer">Employer Name <span class="required">*</span></label>
                            <input type="text" id="employer" name="employer" required placeholder="Company Name">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="income">Monthly Income <span class="required">*</span></label>
                            <input type="text" id="income" name="income" required placeholder="$0.00">
                        </div>
                    </div>
                </div>

                <!-- Rental History -->
                <div class="form-section">
                    <h2>Rental History</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="current_address">Current/Previous Address <span class="required">*</span></label>
                            <input type="text" id="current_address" name="current_address" required placeholder="123 Main Street">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="landlord_name">Previous Landlord Name</label>
                            <input type="text" id="landlord_name" name="landlord_name" placeholder="Name">
                        </div>
                        <div class="form-group">
                            <label for="landlord_phone">Previous Landlord Phone</label>
                            <input type="tel" id="landlord_phone" name="landlord_phone" placeholder="(555) 123-4567">
                        </div>
                    </div>
                </div>

                <!-- References -->
                <div class="form-section">
                    <h2>References</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reference_name">Personal Reference Name</label>
                            <input type="text" id="reference_name" name="reference_name" placeholder="Name">
                        </div>
                        <div class="form-group">
                            <label for="reference_phone">Personal Reference Phone</label>
                            <input type="tel" id="reference_phone" name="reference_phone" placeholder="(555) 123-4567">
                        </div>
                    </div>
                </div>

                <!-- Agreement -->
                <div class="checkbox-group">
                    <input type="checkbox" id="agreement" name="agreement" required>
                    <label for="agreement" style="margin-bottom: 0;">I certify that the information provided is true and accurate <span class="required">*</span></label>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn btn-primary">Submit Application</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Cash For Keys Properties. All rights reserved.</p>
    </footer>
</body>
</html>
